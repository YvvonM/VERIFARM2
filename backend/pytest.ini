[pytest]
# pytest-asyncio: let async test functions run without per-test markers.
asyncio_mode = auto

# Only collect the tests/ package — keeps the stray script-style
# app/verification/test_production.py (live Earth Engine) out of collection.
testpaths = tests

markers =
    integration: needs external services (Postgres/Neo4j/tesseract/Earth Engine); excluded from the default CI run with `-m "not integration"`.
